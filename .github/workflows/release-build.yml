name: release-build

# Manually-triggered build that produces downloadable artifacts:
#   * a stripped native Linux x86_64 aria2c binary
#   * a source distribution tarball (make dist)
# Run it from the Actions tab ("Run workflow") or with:
#   gh workflow run release-build.yml --ref <branch> --repo <owner>/aria2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++ autoconf automake autotools-dev autopoint libtool \
          pkg-config gettext \
          libgnutls28-dev libc-ares-dev zlib1g-dev \
          libsqlite3-dev libssh2-1-dev libcppunit-dev
    - name: Bootstrap
      run: autoreconf -i
    - name: Configure
      run: ./configure --with-gnutls --without-openssl ARIA2_STATIC=no
    - name: Build
      run: make -j"$(nproc)"
    - name: Strip binary
      run: |
        cp src/aria2c aria2c
        strip aria2c
        ./aria2c --version | head -1
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-x86_64
        path: aria2c
        if-no-files-found: error

  source-dist:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++ autoconf automake autotools-dev autopoint libtool \
          pkg-config gettext \
          libgnutls28-dev libc-ares-dev zlib1g-dev \
          libsqlite3-dev libssh2-1-dev libcppunit-dev
    - name: Bootstrap
      run: autoreconf -i
    - name: Configure
      run: ./configure --with-gnutls --without-openssl
    - name: make dist
      run: make dist
    - name: Upload source tarball
      uses: actions/upload-artifact@v4
      with:
        name: aria2-source-dist
        path: aria2-*.tar.*
        if-no-files-found: error
