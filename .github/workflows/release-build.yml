name: release-build

# Manually-triggered build that produces downloadable artifacts:
#   * a stripped native Linux x86_64 aria2c binary
#   * a source distribution tarball (make dist)
# Run it from the Actions tab ("Run workflow") or with:
#   gh workflow run release-build.yml --ref <branch> --repo <owner>/aria2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++ autoconf automake autotools-dev autopoint libtool \
          pkg-config gettext \
          libgnutls28-dev libc-ares-dev zlib1g-dev \
          libsqlite3-dev libssh2-1-dev libcppunit-dev
    - name: Bootstrap
      run: autoreconf -i
    - name: Configure
      run: ./configure --with-gnutls --without-openssl ARIA2_STATIC=no
    - name: Build
      run: make -j"$(nproc)"
    - name: Strip binary
      run: |
        cp src/aria2c aria2c
        strip aria2c
        ./aria2c --version | head -1
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-x86_64
        path: aria2c
        if-no-files-found: error

  source-dist:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++ autoconf automake autotools-dev autopoint libtool \
          pkg-config gettext \
          libgnutls28-dev libc-ares-dev zlib1g-dev \
          libsqlite3-dev libssh2-1-dev libcppunit-dev
    - name: Bootstrap
      run: autoreconf -i
    - name: Configure
      run: ./configure --with-gnutls --without-openssl
    - name: make dist
      run: make dist
    - name: Upload source tarball
      uses: actions/upload-artifact@v4
      with:
        name: aria2-source-dist
        path: aria2-*.tar.*
        if-no-files-found: error

  # Plan A: official-style mingw-w64 cross build on Linux. Dependencies
  # are cross-compiled statically (mirrors Dockerfile.mingw), TLS uses
  # native Windows WinTLS, and ARIA2_STATIC=yes yields a single
  # self-contained aria2c.exe with no external DLLs.
  windows-mingw:
    runs-on: ubuntu-22.04
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: ${{ github.workspace }}/mingw-prefix
    steps:
    - uses: actions/checkout@v6
    - name: Install mingw toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          make binutils autoconf automake autotools-dev libtool \
          patch ca-certificates pkg-config dpkg-dev curl lzip \
          gcc-mingw-w64 g++-mingw-w64 autopoint python3-docutils
    - name: Cache cross-compiled dependencies
      id: deps-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PREFIX }}
        key: mingw-deps-${{ env.HOST }}-gmp6.3.0-expat2.5.0-sqlite3430100-zlib1.3.1-cares1.19.1-ssh1.11.0
    - name: Build static dependencies
      if: steps.deps-cache.outputs.cache-hit != 'true'
      run: |
        set -e
        j=$(nproc)
        build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
        mkdir -p "$PREFIX" deps-src && cd deps-src
        curl -L -O https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
        curl -L -O https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.bz2
        curl -L -O https://www.sqlite.org/2023/sqlite-autoconf-3430100.tar.gz
        curl -L -O https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
        curl -L -O https://github.com/c-ares/c-ares/releases/download/cares-1_19_1/c-ares-1.19.1.tar.gz
        curl -L -O https://libssh2.org/download/libssh2-1.11.0.tar.bz2

        tar xf gmp-6.3.0.tar.xz && cd gmp-6.3.0
        ./configure --disable-shared --enable-static --prefix="$PREFIX" \
          --host=$HOST --disable-cxx --enable-fat CFLAGS="-mtune=generic -O2 -g0"
        make -j$j install && cd ..

        tar xf expat-2.5.0.tar.bz2 && cd expat-2.5.0
        ./configure --disable-shared --enable-static --prefix="$PREFIX" \
          --host=$HOST --build=$build
        make -j$j install && cd ..

        tar xf sqlite-autoconf-3430100.tar.gz && cd sqlite-autoconf-3430100
        ./configure --disable-shared --enable-static --prefix="$PREFIX" \
          --host=$HOST --build=$build
        make -j$j install && cd ..

        tar xf zlib-1.3.1.tar.gz && cd zlib-1.3.1
        CC=$HOST-gcc AR=$HOST-ar LD=$HOST-ld RANLIB=$HOST-ranlib STRIP=$HOST-strip \
          ./configure --prefix="$PREFIX" --libdir="$PREFIX/lib" \
          --includedir="$PREFIX/include" --static
        make -j$j install && cd ..

        tar xf c-ares-1.19.1.tar.gz && cd c-ares-1.19.1
        ./configure --disable-shared --enable-static --without-random \
          --prefix="$PREFIX" --host=$HOST --build=$build LIBS="-lws2_32"
        make -j$j install && cd ..

        tar xf libssh2-1.11.0.tar.bz2 && cd libssh2-1.11.0
        ./configure --disable-shared --enable-static --prefix="$PREFIX" \
          --host=$HOST --build=$build LIBS="-lws2_32"
        make -j$j install && cd ..
    - name: Build aria2 (mingw, static single-file)
      run: |
        autoreconf -i
        ./mingw-config
        make -j"$(nproc)"
        $HOST-strip src/aria2c.exe
        echo "=== aria2c.exe DLL imports (should be Windows system DLLs only) ==="
        $HOST-objdump -p src/aria2c.exe | grep -i "DLL Name" || true
    - name: Upload aria2c.exe (mingw)
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-x86_64-mingw
        path: src/aria2c.exe
        if-no-files-found: error

  # Plan B: native build inside MSYS2 (UCRT64). Dependencies come from
  # pacman; ARIA2_STATIC=yes statically links everything (incl. the gcc
  # runtime) into one aria2c.exe, so no MSYS2 DLLs are needed at runtime.
  windows-msys2:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel git gettext-devel
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-autotools
          mingw-w64-ucrt-x86_64-pkgconf
          mingw-w64-ucrt-x86_64-c-ares
          mingw-w64-ucrt-x86_64-libssh2
          mingw-w64-ucrt-x86_64-sqlite3
          mingw-w64-ucrt-x86_64-expat
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-gmp
    - name: Build aria2 (static single-file)
      run: |
        autoreconf -i
        # NOTE: --disable-websocket avoids building the bundled
        # deps/wslay sub-project. Its configure is generated on the
        # fly by autoreconf and, under the MSYS2/UCRT64 shell, comes
        # out with a syntax error (an AC_CHECK_HEADERS loop fails to
        # parse), aborting the build. WebSocket RPC is therefore not
        # available in this MSYS2 variant; HTTP JSON-RPC still is, and
        # the mingw cross build (Plan A) provides a full-featured exe.
        # --build/--host must be the mingw triple (not the autodetected
        # x86_64-pc-msys) so configure.ac's `case $host in *mingw*)`
        # branch runs and defines HAVE_WINSOCK2_H / HAVE_WS2TCPIP_H /
        # HAVE_WINIOCTL_H. Without it the Windows socket and winioctl
        # headers are never included and the build fails with
        # "'sockaddr'/'WSABUF'/'FSCTL_SET_SPARSE' does not name a type".
        # Setting build==host keeps it a native (non-cross) build.
        ./configure \
          --build=x86_64-w64-mingw32 --host=x86_64-w64-mingw32 \
          --without-included-gettext --disable-nls \
          --disable-websocket \
          --with-libcares --with-sqlite3 --with-libexpat \
          --with-libz --with-libgmp --with-libssh2 \
          --with-wintls \
          --without-gnutls --without-openssl \
          --without-libxml2 --without-libgcrypt --without-libnettle \
          ARIA2_STATIC=yes
        make -j"$(nproc)"
        strip src/aria2c.exe
        echo "=== aria2c.exe runtime dependencies (want: Windows system DLLs only) ==="
        ldd src/aria2c.exe || true
    - name: Upload aria2c.exe (msys2)
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-x86_64-msys2
        path: src/aria2c.exe
        if-no-files-found: error
